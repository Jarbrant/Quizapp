<!-- ============================================================
     FIL: pages/play.html  (HEL FIL)
     AO-QUIZ-01B (FAS 1) — Play-sida: ladda quiz + spela + auto-rättning + resultat
     Policy: UI-only (GitHub Pages), XSS-safe (textContent i JS), fail-closed, inga externa libs
     Version: 1.0.0

     URL:
       pages/play.html?quiz=data/<fil>.json
     (play.html ligger i /pages, så quiz hämtas från ../data/.. via src/play.js)

     Hooks (måste matcha src/play.js):
       #app, #errorBox, #startBox, #quizTitle, #quizMeta, #startBtn,
       #playBox, #progressText, #progressBarInner, #navPrevBtn, #navNextBtn,
       #checkBtn, #questionSlot, #feedbackSlot, #finishBtn,
       #resultBox, #resultSummary, #resultList, #restartLink
============================================================ -->
<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz — Spela</title>

  <!-- Befintlig CSS (om tom nu, kan fyllas i senare AO) -->
  <link rel="stylesheet" href="../styles/main.css" />

  <!-- Minimal baseline styles (så sidan är användbar även om main.css är tom) -->
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f6f7fb; color: #111; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding: 12px 16px; border-bottom: 1px solid rgba(0,0,0,0.08); background: #fff; position: sticky; top:0; z-index: 10; }
    .topbar a { color: inherit; text-decoration: none; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
    .card { background:#fff; border:1px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
    .stack { display:flex; flex-direction:column; gap: 12px; }
    .row { display:flex; gap: 10px; align-items: center; }
    .row input { width: 18px; height: 18px; }
    .input { width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.16); font: inherit; }
    textarea.input { resize: vertical; }
    .muted { color: rgba(0,0,0,0.62); font-size: 14px; }
    .pre { white-space: pre-wrap; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 10px 12px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.14); background: #fff; cursor:pointer; font: inherit; }
    .btn.primary { background:#111827; color:#fff; border-color:#111827; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .controls { display:flex; flex-wrap: wrap; gap: 10px; }
    .progressWrap { display:flex; align-items:center; gap: 12px; }
    .bar { flex: 1 1 auto; height: 10px; background: rgba(0,0,0,0.08); border-radius: 999px; overflow:hidden; }
    .bar > div { height: 100%; width: 0%; background: #111827; }
    .badge { display:inline-flex; align-items:center; padding: 4px 10px; border-radius: 999px; font-size: 13px; border:1px solid rgba(0,0,0,0.14); width: fit-content; }
    .badge.ok { background: rgba(34,197,94,0.10); border-color: rgba(34,197,94,0.35); }
    .badge.bad { background: rgba(239,68,68,0.10); border-color: rgba(239,68,68,0.35); }
    .matchList { display:flex; flex-direction:column; gap: 8px; margin-bottom: 10px; }
    .matchRow { display:flex; gap: 10px; align-items:flex-start; padding: 8px 10px; border: 1px dashed rgba(0,0,0,0.16); border-radius: 12px; background: rgba(0,0,0,0.02); }
    .matchKey { width: 32px; height: 32px; border-radius: 10px; background: #111827; color:#fff; display:flex; align-items:center; justify-content:center; font-weight: 700; }
    .matchLeft { flex: 1 1 auto; }
    .split { display:grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 860px) { .split { grid-template-columns: 1fr 1fr; } }
  </style>
</head>

<body>
  <header class="topbar">
    <a href="../index.html" class="btn" aria-label="Till startsidan">← Start</a>
    <div class="muted">Quiz — Play</div>
    <div></div>
  </header>

  <main class="wrap">
    <div id="app" class="stack">

      <!-- FAIL-CLOSED: Fel -->
      <section id="errorBox" style="display:none;"></section>

      <!-- Start -->
      <section id="startBox" class="card">
        <div class="stack">
          <div>
            <h1 id="quizTitle" style="margin:0 0 6px 0;">Quiz</h1>
            <div id="quizMeta" class="muted">—</div>
          </div>

          <div class="controls">
            <button id="startBtn" class="btn primary" type="button">Starta</button>
            <a class="btn" href="../index.html">Till startsidan</a>
          </div>

          <div class="muted">
            Tips: öppna via <code>pages/play.html?quiz=data/&lt;fil&gt;.json</code>
          </div>
        </div>
      </section>

      <!-- Play -->
      <section id="playBox" class="card" style="display:none;">
        <div class="stack">

          <div class="progressWrap">
            <div id="progressText" class="badge">0/0</div>
            <div class="bar" aria-label="Progress">
              <div id="progressBarInner"></div>
            </div>
          </div>

          <div class="controls">
            <button id="navPrevBtn" class="btn" type="button">Föregående</button>
            <button id="navNextBtn" class="btn" type="button">Nästa</button>
            <button id="checkBtn" class="btn primary" type="button">Rätta</button>
            <button id="finishBtn" class="btn" type="button" disabled>Resultat</button>
          </div>

          <div id="feedbackSlot" class="muted" aria-live="polite"></div>

          <div id="questionSlot"></div>
        </div>
      </section>

      <!-- Resultat -->
      <section id="resultBox" class="card" style="display:none;">
        <div class="stack">
          <div class="row" style="justify-content:space-between; align-items:baseline;">
            <h2 id="resultSummary" style="margin:0;">Resultat</h2>
            <a id="restartLink" class="btn" href="./play.html">Spela om</a>
          </div>

          <div id="resultList" class="stack"></div>

          <div class="controls">
            <a class="btn" href="../index.html">Till startsidan</a>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Motor -->
  <script type="module" src="../src/play.js"></script>
</body>
</html>
